name: Robot Framework Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  robot-web-test:
    name: Google Selenium Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install selenium

      - name: Verify Chrome
        run: |
             google-chrome --version
             chromedriver --version

   
      - name: Run Google Tests
        run: |
          python -m robot -d tests/google tests/google.robot

      - name: Upload Google Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-robot-results
          path: results/google


  robot-vehicle-test:
    name: Automobile Vehicle Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Verify Chrome
        run: |
             google-chrome --version
             chromedriver --version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install selenium

     
      - name: Run Vehicle Tests
        run: |
          python -m robot -d tests/vehicle tests/vehicle.robot

      - name: Upload Vehicle Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-robot-results
          path: results/vehicle
